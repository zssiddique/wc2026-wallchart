name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes during tournament
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch live scores (tries 3 sources)
        run: |
          set +e  # don't fail whole job if one source fails

          fetch_scores() {
            local URL="$1"
            local LABEL="$2"
            echo "Trying $LABEL..."
            HTTP=$(curl -s --max-time 10 -o /tmp/raw.json -w "%{http_code}" \
              "$URL" -H "Accept: application/json" -H "User-Agent: Mozilla/5.0")
            if [ "$HTTP" = "200" ] && [ -s /tmp/raw.json ]; then
              echo "$LABEL OK (HTTP $HTTP)"
              return 0
            fi
            echo "$LABEL failed (HTTP $HTTP)"
            return 1
          }

          # Try sources in order
          if fetch_scores "https://worldcup26.ir/get/games" "worldcup26.ir"; then
            SOURCE="worldcup26.ir"
          elif fetch_scores "https://wcup2026.org/api/data.php?action=results" "wcup2026.org"; then
            SOURCE="wcup2026.org"
          elif fetch_scores "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json" "openfootball"; then
            SOURCE="openfootball"
          else
            echo "All sources failed — keeping existing scores.json"
            exit 0
          fi

          python3 << PYEOF
import json, datetime, sys

with open('/tmp/raw.json') as f:
    try:
        data = json.load(f)
    except:
        print("JSON parse failed")
        sys.exit(0)

source = "$SOURCE"
NAME_MAP = {
  'United States':'USA','Bosnia-Herzegovina':'Bosnia & Herz.',
  'Bosnia & Herzegovina':'Bosnia & Herz.',"Côte d'Ivoire":'Ivory Coast',
  "Cote d'Ivoire":'Ivory Coast','Cape Verde Islands':'Cape Verde',
  'Cabo Verde':'Cape Verde','Democratic Republic of Congo':'DR Congo',
  'Congo DR':'DR Congo','Korea Republic':'South Korea',
  'Republic of Korea':'South Korea','Czech Republic':'Czechia',
}
def n(x): return NAME_MAP.get(x,x) if x else x

matches_out = []

if source == 'worldcup26.ir':
    raw = data if isinstance(data,list) else data.get('games',data.get('matches',[]))
    for m in raw:
        status = (m.get('status') or m.get('matchStatus') or '').lower()
        if status in ('scheduled','tbd',''): continue
        hn = n(m.get('homeTeam',{}).get('name') or m.get('home',''))
        an = n(m.get('awayTeam',{}).get('name') or m.get('away',''))
        try:
            hs  = int(m.get('homeScore') or m.get('home_score') or (m.get('score') or {}).get('home',-1))
            as_ = int(m.get('awayScore') or m.get('away_score') or (m.get('score') or {}).get('away',-1))
        except: continue
        if hs<0 or as_<0: continue
        matches_out.append({'home':hn,'away':an,'hs':hs,'as_':as_})

elif source == 'wcup2026.org':
    raw = data.get('matches') or data.get('results') or data.get('data') or data
    for m in (raw if isinstance(raw,list) else []):
        hn  = n(m.get('home_team') or m.get('home',''))
        an  = n(m.get('away_team') or m.get('away',''))
        try:
            hs  = int(m.get('home_score') or m.get('score_home',-1))
            as_ = int(m.get('away_score') or m.get('score_away',-1))
        except: continue
        if hs<0 or as_<0: continue
        matches_out.append({'home':hn,'away':an,'hs':hs,'as_':as_})

elif source == 'openfootball':
    for rnd in data.get('rounds',[]):
        for m in rnd.get('matches',[]):
            if not m.get('score',{}).get('ft'): continue
            hs, as_ = m['score']['ft']
            hn = n(m.get('team1',{}).get('name') if isinstance(m.get('team1'),dict) else m.get('team1',''))
            an = n(m.get('team2',{}).get('name') if isinstance(m.get('team2'),dict) else m.get('team2',''))
            matches_out.append({'home':hn,'away':an,'hs':hs,'as_':as_})

# Also grab knockout matches if available
knockout_out = []
if source == 'worldcup26.ir':
    for m in (data if isinstance(data,list) else data.get('games',data.get('matches',[]))):
        stage = (m.get('stage') or m.get('round') or m.get('phase') or '').lower()
        is_ko = any(x in stage for x in ('round','quarter','semi','final','knockout'))
        if not is_ko: continue
        hn = n(m.get('homeTeam',{}).get('name') or m.get('home',''))
        an = n(m.get('awayTeam',{}).get('name') or m.get('away',''))
        try:
            hs  = int(m.get('homeScore') or m.get('home_score') or (m.get('score') or {}).get('home',-1))
            as_ = int(m.get('awayScore') or m.get('away_score') or (m.get('score') or {}).get('away',-1))
        except: continue
        if hs<0 or as_<0: continue
        knockout_out.append({'home':hn,'away':an,'hs':hs,'as_':as_})

out = {
    'source':  source,
    'fetched': datetime.datetime.utcnow().isoformat()+'Z',
    'matches': matches_out,
    'knockout': knockout_out,
}
with open('scores.json','w') as f:
    json.dump(out, f, indent=2)
print(f"Wrote {len(matches_out)} matches from {source}")
PYEOF

      - name: Commit scores.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          git diff --staged --quiet || git commit -m "🔄 scores.json [skip ci]"
          git push || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
